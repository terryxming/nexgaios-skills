version: 1
review_root: docs/impact-reviews/{{skill_id}}

contracts:
  - id: skill-entry-contract
    description: Skill 入口、维护说明、测试矩阵和版本记录必须同步演化
    sources:
      - SKILL.md
      - README.md
      - references/*.md
      - scripts/*
      - tests/*
      - assets/*
      - skill.yaml
      - impact.yaml
    witnesses:
      - SKILL.md
      - README.md
      - tests/README.md
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed
