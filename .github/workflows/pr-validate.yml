name: 验证变更技能

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 生成 PR 技能变更说明
        run: node tools/skills/skill-cli.mjs pr-summary --base "origin/${{ github.base_ref }}...HEAD" > pr-summary.md

      - name: 评论 PR 技能变更说明
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --edit-last --create-if-none --body-file pr-summary.md

      - name: 校验生成文档
        run: pnpm skills:docs:check

      - name: 防误传检查
        run: pnpm skills:guard --base "origin/${{ github.base_ref }}...HEAD"

      - name: 影响链路硬检查
        run: pnpm skills:impact --base "origin/${{ github.base_ref }}...HEAD" --strict

      - name: 验证变更技能
        shell: bash
        run: |
          CHANGED="$(node tools/skills/skill-cli.mjs changed --base "origin/${{ github.base_ref }}...HEAD")"
          if [ -z "$CHANGED" ]; then
            echo "没有变更的技能。"
            exit 0
          fi

          echo "$CHANGED" | while read -r skill; do
            [ -z "$skill" ] && continue
            node tools/skills/skill-cli.mjs validate "$skill"
          done
