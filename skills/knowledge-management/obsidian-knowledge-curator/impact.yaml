version: 1
review_root: docs/impact-reviews/obsidian-knowledge-curator
ignored_files:
  - impact/graph.*

contracts:
  - id: skill-entry-contract
    description: SKILL.md 与 agent 配置共同定义触发边界和入口行为
    sources:
      - SKILL.md
      - agents/openai.yaml
    witnesses:
      - README.md
      - references/README.md
      - tests/README.md
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed

  - id: reference-system-contract
    description: reference 文件变化会影响渐进式披露、测试契约和执行路由
    sources:
      - references/*.md
    witnesses:
      - SKILL.md
      - references/README.md
      - tests/README.md
      - scripts/validate_okc_contract.py
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed

  - id: project-memory-contract
    description: 母文档规则必须同步检查生命周期、样本和自动验证
    sources:
      - references/project-memory.md
      - references/lifecycle-policy.md
    witnesses:
      - SKILL.md
      - references/README.md
      - tests/README.md
      - assets/okc-showcase-template.md
      - scripts/validate_okc_contract.py
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed

  - id: visual-showcase-contract
    description: 视觉版式规则、CSS snippet 和样本模板必须作为同一组能力维护
    sources:
      - references/obsidian-visual-patterns.md
      - assets/*
    witnesses:
      - README.md
      - tests/README.md
      - assets/README.md
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed

  - id: validation-contract
    description: 自动验证脚本和测试矩阵共同定义可机器检查的业务契约
    sources:
      - scripts/*.py
      - tests/README.md
    witnesses:
      - README.md
      - scripts/README.md
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed

  - id: impact-governance-contract
    description: impact 规则自身变化必须同步检查 OKC 的维护说明和验证闭环
    sources:
      - impact.yaml
    witnesses:
      - README.md
      - tests/README.md
      - scripts/validate_okc_contract.py
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed

  - id: impact-console-contract
    description: 实时控制台资产必须与 OKC 的治理说明、测试矩阵和版本记录同步维护
    sources:
      - impact/README.md
      - impact/console.html
    witnesses:
      - README.md
      - tests/README.md
      - scripts/validate_okc_contract.py
      - skill.yaml
      - CHANGELOG.md
    require:
      - witness_changed_or_reviewed
      - version_changed_or_reviewed
